service: picoclaw
useDotenv: true

provider:
  name: aws
  runtime: provided.al2023
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'eu-west-1'}
  architecture: arm64
  profile: ${opt:profile, env:AWS_PROFILE, 'default'}
  deploymentBucket: ${env:DEPLOYMENT_BUCKET}
  environment:
    PICOCLAW_HOME: /tmp/picoclaw
    PICOCLAW_WORKSPACE_BUCKET: !Ref WorkspacesBucket
    LOG_LEVEL: ${env:LOG_LEVEL, "debug"}
    QUEUE_URL: !Ref UpdatesQueue
    AUTO_SETUP: ${env:AUTO_SETUP, "true"}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource: !GetAtt UpdatesQueue.Arn
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource: 
            - !GetAtt WorkspacesBucket.Arn
            - !Sub ${WorkspacesBucket.Arn}/*

package:
  individually: true

functions:
  webhook:
    handler: bootstrap
    package:
      artifact: ../build/tg-webhook-lambda.zip
    url: true
    memorySize: 256

  worker:
    handler: bootstrap
    package:
      artifact: ../build/tg-worker-lambda.zip
    timeout: 900 # 15 minutes
    memorySize: 256
    environment:
      PATH: /var/task/assets/bin:/var/task/assets/python/bin:/opt/bin:/usr/local/bin:/usr/bin:/bin
      PYTHONHOME: /var/task/assets/python
      PYTHONPATH: /var/task/assets/python/lib/python3.12/site-packages
      LD_LIBRARY_PATH: /var/task/assets/python/lib
    events:
      - sqs:
          arn: !GetAtt UpdatesQueue.Arn
          batchSize: 1

  heartbeat:
    handler: bootstrap
    package:
      artifact: ../build/tg-heartbeat-lambda.zip
    timeout: 300
    memorySize: 128
    environment:
      QUEUE_URL: !Ref UpdatesQueue
      PICOCLAW_WORKSPACE_BUCKET: !Ref WorkspacesBucket
    events:
      - schedule:
          rate: rate(1 hour)
          enabled: true

resources:
  Resources:
    # --- Storage (S3) ---
    WorkspacesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: picoclaw-workspaces-${self:provider.stage}-${self:provider.region}

    # --- Communication (SQS) ---
    UpdatesQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: picoclaw-updates-queue.fifo
        FifoQueue: true
        ContentBasedDeduplication: true
        VisibilityTimeout: 300 # Must be >= Lambda timeout
