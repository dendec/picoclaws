service: picoclaw
useDotenv: true

provider:
  name: aws
  runtime: provided.al2023
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'eu-west-1'}
  architecture: arm64
  profile: ${opt:profile, env:AWS_PROFILE, 'default'}
  deploymentBucket: ${env:DEPLOYMENT_BUCKET}
  environment:
    PICOCLAW_HOME: /tmp/home
    PICOCLAW_WORKSPACE_BUCKET: !Ref WorkspacesBucket
    LOG_LEVEL: ${env:LOG_LEVEL, "debug"}
    QUEUE_URL: !Ref UpdatesQueue
    AUTO_SETUP: ${env:AUTO_SETUP, "true"}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource: 
            - !GetAtt UpdatesQueue.Arn
            - !GetAtt TaskQueue.Arn
            - !GetAtt TaskDLQ.Arn
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource: 
            - !GetAtt WorkspacesBucket.Arn
            - !Sub ${WorkspacesBucket.Arn}/*

package:
  individually: true

functions:
  webhook:
    handler: bootstrap
    package:
      artifact: ../build/tg-webhook-lambda.zip
    url: true
    memorySize: 128

  worker:
    handler: bootstrap
    package:
      artifact: ../build/tg-worker-lambda.zip
    timeout: 300 # 5 minutes
    memorySize: 512
    environment:
      PATH: /var/task/assets/bin:/var/task/assets/python/bin:/opt/bin:/usr/local/bin:/usr/bin:/bin
      PYTHONHOME: /var/task/assets/python
      PYTHONPATH: /var/task/assets/python/lib/python3.12/site-packages
      LD_LIBRARY_PATH: /var/task/assets/python/lib
      API_KEY: ${env:API_KEY}
      TASK_EXECUTOR_URL: !GetAtt ExecutorLambdaFunctionUrl.FunctionUrl
    events:
      - sqs:
          arn: !GetAtt UpdatesQueue.Arn
          batchSize: 1

  heartbeat:
    handler: bootstrap
    package:
      artifact: ../build/tg-heartbeat-lambda.zip
    timeout: 300
    memorySize: 128
    environment:
      QUEUE_URL: !Ref UpdatesQueue
      PICOCLAW_WORKSPACE_BUCKET: !Ref WorkspacesBucket
    events:
      - schedule:
          rate: rate(1 hour)
          enabled: true

  executor:
    handler: handler.http_handler
    runtime: python3.12
    timeout: 30 # Quick submission
    memorySize: 512
    url: true
    environment:
      QUEUE_URL: !Ref TaskQueue
      PICOCLAW_WORKSPACE_BUCKET: !Ref WorkspacesBucket
      PYTHONPATH: /var/task/lib
      API_KEY: ${env:API_KEY}
    package:
      artifact: ../build/task-executor-lambda.zip

  waiter:
    handler: handler.sqs_handler
    runtime: python3.12
    timeout: 20 # Quick check only
    memorySize: 512
    environment:
      RESULT_QUEUE_URL: !Ref UpdatesQueue
      PICOCLAW_WORKSPACE_BUCKET: !Ref WorkspacesBucket
      PYTHONPATH: /var/task/lib
      API_KEY: ${env:API_KEY}
    package:
      artifact: ../build/task-executor-lambda.zip
    events:
      - sqs:
          arn: !GetAtt TaskQueue.Arn
          batchSize: 1

resources:
  Resources:
    # --- Storage (S3) ---
    WorkspacesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: picoclaw-workspaces-${self:provider.stage}-${self:provider.region}

    # --- Communication (SQS) ---
    UpdatesQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: picoclaw-updates-queue.fifo
        FifoQueue: true
        ContentBasedDeduplication: true
        VisibilityTimeout: 330 # Must be > Lambda timeout (300s) + buffer

    TaskQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: picoclaw-tasks-queue.fifo
        FifoQueue: true
        ContentBasedDeduplication: true
        VisibilityTimeout: 10 # Retry every 10 seconds
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt TaskDLQ.Arn
          maxReceiveCount: 90 # ~15 minutes total polling

    TaskDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: picoclaw-tasks-dlq.fifo
        FifoQueue: true
